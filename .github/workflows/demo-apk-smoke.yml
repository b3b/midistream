name: Demo APK smoke test

on:
  push:
    branches:
      - smoke-test
  workflow_dispatch:
    inputs:
      apk_url:
        description: URL of the examples/demo APK to test
        default: https://github.com/b3b/midistream/releases/download/v0.3.1.8/midistreamdemo-0.0.1-arm64-v8a_armeabi-v7a_x86_64-debug.apk
        required: false
        type: string

permissions:
  contents: read

jobs:
  smoke-test-demo-apk:
    name: Run examples/demo APK smoke test
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    env:
      APK_URL: ${{ inputs.apk_url || 'https://github.com/b3b/midistream/releases/download/v0.3.1.8/midistreamdemo-0.0.1-arm64-v8a_armeabi-v7a_x86_64-debug.apk' }}
      PACKAGE_NAME: org.midistream.midistreamdemo
      PASS_MARKER: MIDISTREAM_DEMO_PASS
      FAIL_MARKER: MIDISTREAM_DEMO_FAIL

    steps:
      - name: Download APK
        shell: bash
        run: |
          curl --fail --location --retry 3 --retry-delay 5 \
            --output demo.apk \
            "$APK_URL"
          ls -lh demo.apk
          sha256sum demo.apk
          unzip -t demo.apk

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write smoke test script
        shell: bash
        run: |
          cat > smoke-test-demo-apk.sh <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail

          adb uninstall "$PACKAGE_NAME" >/dev/null 2>&1 || true
          adb install -r -t demo.apk
          adb shell getprop ro.product.cpu.abi
          adb shell getprop ro.build.version.sdk
          adb shell pm path "$PACKAGE_NAME"
          adb logcat -c

          echo "Launching $PACKAGE_NAME"
          adb shell monkey -p "$PACKAGE_NAME" -c android.intent.category.LAUNCHER 1

          required_markers=(
            "MIDISTREAM_APP_BUILD"
            "$PASS_MARKER"
            "MIDISTREAM_DEMO_START"
            "MIDISTREAM_VERSION="
            "MIDISTREAM_TEST_INIT=PASS"
            "MIDISTREAM_TEST_CONFIG=PASS"
            "MIDISTREAM_TEST_VOLUME=PASS"
            "MIDISTREAM_TEST_REVERB=PASS"
            "MIDISTREAM_TEST_WRITE=PASS"
          )

          echo "Waiting for smoke-test marker..."
          deadline=$((SECONDS + 120))

          while (( SECONDS < deadline )); do
            adb logcat -d > logcat.txt

            if grep -q "$FAIL_MARKER" logcat.txt; then
              echo "::error::Demo emitted failure marker"
              grep -E "MIDISTREAM_|midistream-demo" logcat.txt || true
              exit 1
            fi

            if grep -q "$PASS_MARKER" logcat.txt; then
              echo "Demo smoke test passed"
              break
            fi

            sleep 2
          done

          if ! grep -q "$PASS_MARKER" logcat.txt; then
            echo "::error::Timed out waiting for pass marker: $PASS_MARKER"
            grep -E "MIDISTREAM_|midistream-demo" logcat.txt || true
            exit 1
          fi

          missing=0
          for marker in "${required_markers[@]}"; do
            if ! grep -q "$marker" logcat.txt; then
              echo "::error::Missing expected log marker: $marker"
              missing=1
            fi
          done

          echo "Observed Midistream markers:"
          grep -E "MIDISTREAM_|midistream-demo" logcat.txt || true

          if (( missing )); then
            exit 1
          fi
          BASH

          chmod +x smoke-test-demo-apk.sh

      - name: Run APK on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: default
          arch: x86_64
          profile: pixel_2
          avd-name: midistream-smoke
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./smoke-test-demo-apk.sh

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-logcat
          path: logcat.txt
          if-no-files-found: ignore
